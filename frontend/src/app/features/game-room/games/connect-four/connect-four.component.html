<div class="cf-wrapper">
  @if (!gameState) {
    <p class="waiting">Esperando que el juego comience...</p>
  } @else {
    <!-- Drop zone buttons -->
    <div class="drop-row">
      @for (col of cols; track col) {
        <button
          class="drop-btn"
          [class.active]="hoveredCol === col && isMyTurn"
          [disabled]="!canDrop(col)"
          (mouseenter)="hoveredCol = col"
          (mouseleave)="hoveredCol = null"
          (click)="drop(col)">
          ▼
        </button>
      }
    </div>

    <!-- Board -->
    <div class="board">
      @for (row of board; track $index; let r = $index) {
        <div class="row">
          @for (col of cols; track col) {
            <div
              [class]="cellClass(r, col)"
              [ngStyle]="cellStyle(r, col)"
              (mouseenter)="hoveredCol = col"
              (mouseleave)="hoveredCol = null"
              (click)="drop(col)">
            </div>
          }
        </div>
      }
    </div>

    @if (isTerminal()) {
      <div class="result-banner">
        @if (gameState.draw) {
          <span><i class="fa-solid fa-handshake"></i> ¡Empate!</span>
        } @else if (isWinner) {
          <span><i class="fa-solid fa-trophy"></i> ¡Ganaste!</span>
        } @else {
          <span><i class="fa-solid fa-skull"></i> Perdiste</span>
        }
      </div>
    }
  }
</div>
