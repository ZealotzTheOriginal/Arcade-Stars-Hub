<div class="cf-wrapper">
  @if (!gameState) {
    <p class="waiting">Esperando que el juego comience...</p>
  } @else {
    <!-- Drop zone buttons -->
    <div class="drop-row">
      @for (col of cols; track col) {
        <button
          class="drop-btn"
          [class.active]="hoveredCol === col && isMyTurn"
          [disabled]="!canDrop(col)"
          (mouseenter)="hoveredCol = col"
          (mouseleave)="hoveredCol = null"
          (click)="drop(col)">
          ▼
        </button>
      }
    </div>

    <!-- Board -->
    <div class="board">
      @for (row of board; track $index; let r = $index) {
        <div class="row">
          @for (col of cols; track col) {
            <div
              [class]="cellClass(r, col)"
              [ngStyle]="board[r]?.[col] ? cellStyle(r, col) : hoverCellStyle(r, col)"
              (mouseenter)="hoveredCol = col"
              (mouseleave)="hoveredCol = null"
              (click)="drop(col)">
            </div>
          }
        </div>
      }
    </div>
  }
</div>
