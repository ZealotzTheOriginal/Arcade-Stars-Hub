<div class="auth-layout">
  <div class="auth-card card rainbow-border">
    <div class="auth-logo">
      <span class="logo-icon">⭐</span>
      <h1>Arcade Stars Hub</h1>
    </div>
    <h2>Crear Cuenta</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Nombre de usuario</label>
        <input class="input" [(ngModel)]="displayName" name="name" placeholder="Tu nombre" required />
      </div>
      <div class="field">
        <label>Email</label>
        <input class="input" type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input class="input" type="password" [(ngModel)]="password" name="password" placeholder="Mínimo 6 caracteres" required />
      </div>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }

      <button class="btn btn--primary full-width" type="submit" [disabled]="loading()">
        {{ loading() ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <div class="auth-links">
      <span>¿Ya tienes cuenta?</span>
      <a routerLink="/login">Iniciar Sesión</a>
    </div>
  </div>
</div>
