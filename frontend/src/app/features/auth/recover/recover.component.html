<div class="auth-layout">
  <div class="auth-card card rainbow-border">
    <div class="auth-logo">
      <span class="logo-icon">⭐</span>
      <h1>Arcade Stars Hub</h1>
    </div>
    <h2>Recuperar Contraseña</h2>

    @if (success()) {
      <div class="success-box">
        <p>✅ Correo enviado. Revisa tu bandeja de entrada.</p>
        <a routerLink="/login">Volver al inicio</a>
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()">
        <div class="field">
          <label>Email</label>
          <input class="input" type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required />
        </div>

        @if (error()) {
          <p class="error-msg">{{ error() }}</p>
        }

        <button class="btn btn--primary full-width" type="submit" [disabled]="loading()">
          {{ loading() ? 'Enviando...' : 'Enviar correo' }}
        </button>
      </form>

      <div class="auth-links">
        <a routerLink="/login">← Volver al inicio</a>
      </div>
    }
  </div>
</div>
