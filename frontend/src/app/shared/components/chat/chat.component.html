<div class="chat">
  <button class="chat-header" [class.chat-header--closed]="!open()" (click)="toggle()">
    @if (open()) {
      <i class="fa-solid fa-comments"></i>
      <span class="chat-title-text">Chat</span>
      @if (unread() > 0) {
        <span class="unread-dot" [class.unread-dot--count]="unread() > 1">
          @if (unread() > 1) { {{ unread() }} }
        </span>
      }
      <i class="fa-solid fa-chevron-right chat-chevron"></i>
    } @else {
      <span class="chat-icon-wrap">
        <i class="fa-solid fa-comments"></i>
        @if (unread() > 0) {
          <span class="unread-dot unread-dot--badge" [class.unread-dot--count]="unread() > 1">
            @if (unread() > 1) { {{ unread() }} }
          </span>
        }
      </span>
    }
  </button>

  @if (renderContent()) {
    <div class="msg-list" #msgList>
      @if (messages.length === 0) {
        <p class="empty">Sin mensajes aún</p>
      }
      @for (msg of messages; track $index; let i = $index) {
        <div
          class="msg-wrap"
          [class.mine]="isMine(msg)"
          [class.first]="isFirstInGroup(i)">

          @if (isFirstInGroup(i) && !isMine(msg)) {
            <span class="msg-author">{{ msg.display_name }}</span>
          }
          <div class="bubble">{{ msg.message }}</div>
        </div>
      }
    </div>

    <div class="chat-input">
      <input
        class="input"
        [(ngModel)]="text"
        (keydown)="onKey($event)"
        placeholder="Escribe un mensaje..."
        maxlength="300" />
      <button class="btn btn--ghost send-btn" (click)="send()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  }
</div>
