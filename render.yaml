services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: ash-backend
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      # Paste the full contents of secrets/firebase-service-account.json here
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: project-modules-2026
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      # Set this after the frontend is deployed: https://ash-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false

  # ── Angular Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: ash-frontend
    runtime: static
    region: frankfurt
    plan: free
    rootDir: frontend
    # BACKEND_HOST = hostname only, e.g. ash-backend.onrender.com (no https://)
    buildCommand: "npm ci && sed -i \"s/ASH_BACKEND_HOST/$BACKEND_HOST/g\" src/environments/environment.ts && npm run build"
    staticPublishPath: dist/frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      # Set to the backend hostname: ash-backend.onrender.com
      - key: BACKEND_HOST
        sync: false
